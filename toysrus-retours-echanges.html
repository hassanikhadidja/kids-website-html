<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retours et échanges – Toys"R"Us</title>
<link rel="stylesheet" href="cart-drawer.css">
<link rel="stylesheet" href="signup-drawer.css">
<link rel="stylesheet" href="site-menu.css">
<link rel="stylesheet" href="diy-shell.css">
<link rel="stylesheet" href="site-footer.css">
<style>
  @import url(https://db.onlinewebfonts.com/c/1b62cb414d23538e8a465e7f50aa7932?family=Buenos+Aires);

  :root {
    --blue: #004ebc;
    --blue-dark: #003894;
    --radius-pill: 999px;
  }

  .diy-content {
    background: #fff;
    min-height: calc(100vh - 120px);
    min-height: calc(100dvh - 120px);
  }

  .retours-main {
    width: 380px;
    max-width: 100%;
    background: #fff;
    padding: 28px 20px 48px;
    font-family: 'Buenos Aires', sans-serif;
    color: #11214A;
  }

  .retours-title {
    font-size: clamp(2rem, 6vw, 2.5rem);
    font-weight: 800;
    margin: 0 0 16px;
    line-height: 1.15;
  }

  .retours-intro {
    font-size: 0.875rem;
    line-height: 1.6;
    margin: 0 0 24px;
    color: #1a1a1a;
  }

  .retours-form {
    margin: 0;
  }

  .retours-field {
    margin-bottom: 18px;
  }

  .retours-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: #11214A;
  }

  .retours-input {
    display: block;
    width: 100%;
    box-sizing: border-box;
    border: 1px solid #000;
    border-radius: 0;
    padding: 12px 14px;
    font-size: 0.875rem;
    font-family: 'Buenos Aires', sans-serif;
    color: #1a1a1a;
    background: #fff;
    outline: none;
  }

  .retours-input:focus {
    border-color: #004ebc;
    box-shadow: 0 0 0 1px #004ebc;
  }

  .retours-btn {
    display: block;
    width: 100%;
    box-sizing: border-box;
    border: none;
    border-radius: var(--radius-pill);
    padding: 15px;
    min-height: 48px;
    font-size: 1.02rem;
    font-weight: 700;
    font-family: 'Buenos Aires', sans-serif;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 4px 0 var(--blue-dark);
    transition: transform 0.08s ease, filter 0.15s ease;
  }

  .retours-btn:active:not(:disabled) {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--blue-dark);
  }

  @media (hover: hover) {
    .retours-btn:hover:not(:disabled) {
      filter: brightness(1.08);
    }
  }

  .retours-btn-primary {
    margin-top: 6px;
    background: var(--blue);
    color: #fff;
  }

  .retours-btn-primary:disabled {
    background: #c7ccd4;
    color: #fff;
    box-shadow: 0 4px 0 #a8adb8;
    cursor: not-allowed;
    filter: none;
  }

  .retours-btn-primary:disabled:active {
    transform: none;
    box-shadow: 0 4px 0 #a8adb8;
  }

  .retours-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
    color: #6b6770;
    font-size: 0.875rem;
  }

  .retours-divider::before,
  .retours-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #c7ccd4;
  }

  .retours-btn-secondary {
    display: block;
    width: 100%;
    box-sizing: border-box;
    text-decoration: none;
    background: #fff;
    color: var(--blue);
    border: 2px solid var(--blue);
    box-shadow: 0 4px 0 var(--blue-dark);
  }

  .retours-btn-secondary:active:not(:disabled) {
    box-shadow: 0 1px 0 var(--blue-dark);
  }
</style>
</head>
<body>

<div class="diy-content">
  <section class="retours-main" aria-label="Retours et échanges">
    <h1 class="retours-title">Retours et échanges</h1>
    <p class="retours-intro">Enter your email or phone number and tracking number to login.</p>

    <form class="retours-form" action="#" method="get" novalidate>
      <div class="retours-field">
        <label class="retours-label" for="retours-contact">Email or phone number</label>
        <input class="retours-input" type="text" id="retours-contact" name="contact" autocomplete="email tel" placeholder="">
      </div>

      <div class="retours-field">
        <label class="retours-label" for="retours-tracking">Tracking number</label>
        <input class="retours-input" type="text" id="retours-tracking" name="tracking" autocomplete="off" placeholder="">
      </div>

      <button type="submit" class="retours-btn retours-btn-primary" id="retoursSearchBtn" disabled>Search</button>
    </form>

    <div class="retours-divider" aria-hidden="true">Or</div>

    <a href="toysrus-retours-gift.html" class="retours-btn retours-btn-secondary">Start a return or claim for a gift</a>
  </section>
</div>

<script src="site-menu.js"></script>
<script src="site-footer.js"></script>
<script src="diy-shell.js"></script>
<script src="cart-drawer.js"></script>
<script src="signup-drawer.js"></script>
<script src="auth-links.js"></script>
<script>
(function () {
  var contactInput = document.getElementById('retours-contact');
  var trackingInput = document.getElementById('retours-tracking');
  var searchBtn = document.getElementById('retoursSearchBtn');

  function updateSearchBtn() {
    var filled = contactInput.value.trim() !== '' && trackingInput.value.trim() !== '';
    searchBtn.disabled = !filled;
  }

  contactInput.addEventListener('input', updateSearchBtn);
  trackingInput.addEventListener('input', updateSearchBtn);
  updateSearchBtn();
})();
</script>
</body>
</html>
