<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us – Toys"R"Us</title>
<link rel="stylesheet" href="cart-drawer.css">
<link rel="stylesheet" href="signup-drawer.css">
<link rel="stylesheet" href="site-menu.css">
<link rel="stylesheet" href="diy-shell.css">
<link rel="stylesheet" href="site-footer.css">
<style>
  @import url(https://db.onlinewebfonts.com/c/1b62cb414d23538e8a465e7f50aa7932?family=Buenos+Aires);

  :root {
    --blue: #004ebc;
    --blue-dark: #003894;
    --ink: #11214A;
    --ink-soft: #5B6685;
    --gold: #F5A623;
    --line: #E4E7F2;
    --radius-md: 18px;
    --radius-pill: 999px;
  }

  .diy-content {
    background: #fff;
    min-height: calc(100vh - 120px);
    min-height: calc(100dvh - 120px);
  }

  .contact-main {
    width: 370px;
    max-width: 100%;
    margin: 0 auto;
    padding: 28px 20px 48px;
    font-family: 'Buenos Aires', sans-serif;
    color: var(--ink);
  }

  .contact-page-title {
    font-size: clamp(2rem, 6vw, 2.5rem);
    font-weight: 800;
    margin: 0 0 24px;
    line-height: 1.15;
  }

  .action-cards {
    margin-bottom: 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .action-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    cursor: pointer;
    text-decoration: none;
    color: var(--ink);
    background: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .action-card:hover {
    border-color: var(--blue);
    box-shadow: 0 2px 8px rgba(0, 78, 188, 0.08);
  }

  .action-card .icon-wrap {
    width: 52px;
    height: 52px;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .action-card .box-img {
    width: 46px;
    height: 46px;
    opacity: 0.55;
  }

  .action-card .badge {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #111;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .action-card .badge svg {
    width: 11px;
    height: 11px;
    display: block;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.25;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .badge-warn {
    background: var(--gold) !important;
    color: var(--ink);
  }

  .action-card .label {
    flex: 1;
    font-size: 17px;
    font-weight: 500;
  }

  .action-card .chevron {
    color: #aaa;
    font-size: 18px;
  }

  .contact-form-section {
    margin-top: 8px;
  }

  .contact-form-title {
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 20px;
    color: var(--ink);
  }

  .contact-field {
    margin-bottom: 16px;
  }

  .contact-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: #1a1a1a;
  }

  .contact-input,
  .contact-textarea {
    display: block;
    width: 360px;
    max-width: 100%;
    box-sizing: border-box;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 0.875rem;
    font-family: 'Buenos Aires', sans-serif;
    color: #1a1a1a;
    background: #fff;
    outline: none;
  }

  .contact-textarea {
    min-height: 120px;
    resize: vertical;
  }

  .contact-input:focus,
  .contact-textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 1px var(--blue);
  }

  .contact-file-input {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    border: 0;
  }

  .contact-attach-btn {
    display: block;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 14px;
    padding: 13px 20px;
    border: 2px solid var(--blue);
    border-radius: var(--radius-pill);
    background: #fff;
    color: var(--blue);
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Buenos Aires', sans-serif;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 4px 0 var(--blue-dark);
    transition: transform 0.08s ease, filter 0.15s ease;
  }

  .contact-attach-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--blue-dark);
  }

  @media (hover: hover) {
    .contact-attach-btn:hover {
      filter: brightness(1.05);
      background: #f0f5ff;
    }
  }

  .contact-file-name {
    font-size: 0.8rem;
    color: var(--ink-soft);
    margin: -8px 0 14px;
    word-break: break-all;
  }

  .contact-send-btn {
    display: block;
    width: 100%;
    box-sizing: border-box;
    border: none;
    border-radius: var(--radius-pill);
    padding: 15px;
    min-height: 48px;
    font-size: 1.02rem;
    font-weight: 700;
    font-family: 'Buenos Aires', sans-serif;
    cursor: pointer;
    text-align: center;
    background: var(--blue);
    color: #fff;
    box-shadow: 0 4px 0 var(--blue-dark);
    transition: transform 0.08s ease, filter 0.15s ease;
  }

  .contact-send-btn:active:not(:disabled) {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--blue-dark);
  }

  @media (hover: hover) {
    .contact-send-btn:hover:not(:disabled) {
      filter: brightness(1.08);
    }
  }

  .contact-send-btn:disabled {
    background: #c7ccd4;
    box-shadow: 0 4px 0 #a8adb8;
    cursor: not-allowed;
    filter: none;
  }

  .contact-recaptcha {
    width: 360px;
    max-width: 100%;
    margin-top: 18px;
    font-size: 0.75rem;
    line-height: 1.5;
    color: var(--ink-soft);
  }
</style>
</head>
<body>

<div class="diy-content">
  <main class="contact-main" aria-label="Contact Us">
    <h1 class="contact-page-title">Contact Us</h1>

    <div class="action-cards">
      <a class="action-card" href="toysrus-retours-echanges.html">
        <div class="icon-wrap">
          <svg class="box-img" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="8" y="20" width="44" height="32" rx="3" fill="#c8c8c8"/>
            <rect x="8" y="12" width="44" height="10" rx="2" fill="#b0b0b0"/>
            <rect x="22" y="12" width="16" height="10" fill="#9a9a9a"/>
            <rect x="20" y="30" width="20" height="4" rx="1" fill="#a0a0a0"/>
          </svg>
          <div class="badge">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>
          </div>
        </div>
        <span class="label">Track order</span>
        <span class="chevron">›</span>
      </a>
      <a class="action-card" href="#contact-form">
        <div class="icon-wrap">
          <svg class="box-img" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="8" y="20" width="44" height="32" rx="3" fill="#c8c8c8"/>
            <rect x="8" y="12" width="44" height="10" rx="2" fill="#b0b0b0"/>
            <rect x="22" y="12" width="16" height="10" fill="#9a9a9a"/>
            <rect x="20" y="30" width="20" height="4" rx="1" fill="#a0a0a0"/>
          </svg>
          <div class="badge badge-warn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3L2 21h20L12 3z"/><path d="M12 10v4"/><circle cx="12" cy="17.5" r=".75" fill="currentColor" stroke="none"/></svg>
          </div>
        </div>
        <span class="label">Report issue</span>
        <span class="chevron">›</span>
      </a>
    </div>

    <section class="contact-form-section" id="contact-form">
      <h2 class="contact-form-title">Contact Us</h2>

      <form class="contact-form" id="contactForm" action="#" method="post" novalidate>
        <div class="contact-field">
          <label class="contact-label" for="contact-name">Name</label>
          <input class="contact-input" type="text" id="contact-name" name="name" autocomplete="name" required>
        </div>

        <div class="contact-field">
          <label class="contact-label" for="contact-phone">Phone number</label>
          <input class="contact-input" type="tel" id="contact-phone" name="phone" autocomplete="tel">
        </div>

        <div class="contact-field">
          <label class="contact-label" for="contact-email">Email</label>
          <input class="contact-input" type="email" id="contact-email" name="email" autocomplete="email" required>
        </div>

        <div class="contact-field">
          <label class="contact-label" for="contact-message">Message</label>
          <textarea class="contact-textarea" id="contact-message" name="message" required></textarea>
        </div>

        <input class="contact-file-input" type="file" id="contact-files" name="files" multiple>
        <button type="button" class="contact-attach-btn" id="contactAttachBtn">Attach files</button>
        <p class="contact-file-name" id="contactFileName" hidden></p>

        <button type="submit" class="contact-send-btn" id="contactSendBtn" disabled>Send</button>

        <p class="contact-recaptcha">This site is protected by reCAPTCHA. For more information, please refer to Gorgias'</p>
      </form>
    </section>
  </main>
</div>

<script src="site-menu.js"></script>
<script src="site-footer.js"></script>
<script src="diy-shell.js"></script>
<script src="cart-drawer.js"></script>
<script src="signup-drawer.js"></script>
<script src="auth-links.js"></script>
<script>
(function () {
  var form = document.getElementById('contactForm');
  var sendBtn = document.getElementById('contactSendBtn');
  var attachBtn = document.getElementById('contactAttachBtn');
  var fileInput = document.getElementById('contact-files');
  var fileNameEl = document.getElementById('contactFileName');
  var requiredIds = ['contact-name', 'contact-email', 'contact-message'];

  attachBtn.addEventListener('click', function () {
    fileInput.click();
  });

  fileInput.addEventListener('change', function () {
    if (!fileInput.files || !fileInput.files.length) {
      fileNameEl.hidden = true;
      fileNameEl.textContent = '';
      return;
    }
    var names = Array.prototype.map.call(fileInput.files, function (f) { return f.name; });
    fileNameEl.textContent = names.join(', ');
    fileNameEl.hidden = false;
  });

  function updateSendBtn() {
    var allFilled = requiredIds.every(function (id) {
      var el = document.getElementById(id);
      return el && el.value.trim() !== '';
    });
    sendBtn.disabled = !allFilled;
  }

  requiredIds.forEach(function (id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('input', updateSendBtn);
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
  });

  updateSendBtn();
})();
</script>
</body>
</html>
