<style>
@import url(https://db.onlinewebfonts.com/c/1b62cb414d23538e8a465e7f50aa7932?family=Buenos+Aires);

:root {
  --blue: #004ebc;
  --blue-dark: #003894;
  --ink: #11214A;
  --radius-pill: 999px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Buenos Aires', sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
.diy-content { background: #fff; }
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; border: none; }

.detail-top { background: rgb(249, 249, 249); }
.bc { padding: 18px 18px 6px; font-size: 14px; }
.bc a { color: #1565c0; text-decoration: underline; }

.detail-h {
  font-family: 'Buenos Aires', sans-serif;
  font-size: 32px;
  font-weight: 800;
  text-align: center;
  padding: 14px 22px 12px;
  line-height: 1.2;
}
.detail-tag-wrap { text-align: center; padding: 0 18px 18px; }
.detail-img { margin: 0 14px; border-radius: 16px; overflow: hidden; }
.detail-img svg,
.detail-img img { display: block; width: 100%; height: auto; }
.detail-body { padding: 20px 18px 8px; font-size: 17px; line-height: 1.6; }
.detail-body p { margin-bottom: 14px; }
.detail-sep { height: 1px; background: #e0e0e0; margin: 6px 18px 22px; }
.btn-dl {
  display: inline-block;
  background: var(--blue);
  color: #fff;
  font-family: 'Buenos Aires', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  padding: 14px 36px;
  border-radius: var(--radius-pill);
  margin: 0 18px 34px;
  box-shadow: 0 4px 0 var(--blue-dark);
  transition: transform .08s ease;
}
.btn-dl:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--blue-dark); }

.printable-tag {
  display: inline-block;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 18px;
  border-radius: 999px;
}
.printable-tag.green { background: #D5F5E3; color: #1E8449; box-shadow: 0 3px 0 #1E8449; }

.more-section { margin-top: 32px; padding-bottom: 8px; }
.more-section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 0 18px 8px;
  gap: 12px;
}
.more-section-title {
  font-size: 27px;
  font-weight: 800;
  color: #111;
  line-height: 1.15;
  margin: 0;
}
.more-see-all {
  color: var(--blue);
  text-decoration: underline;
  font-size: 16px;
  font-weight: 700;
  flex-shrink: 0;
}
.printable-card { display: block; }
.photo-card {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  margin: 16px 14px 0;
  min-height: 0;
  background: #f5f5f5;
}
.photo-card svg,
.photo-card img { display: block; width: 100%; height: auto; }
.card-text { padding: 6px 18px 18px; }
.card-title {
  font-family: 'Buenos Aires', sans-serif;
  font-size: 27px;
  font-weight: 800;
  color: #111;
  margin: 0 0 4px;
  line-height: 1.15;
}
.card-desc { font-size: 16px; color: #111; line-height: 1.55; margin: 0; }

#painting-sources { display: none; }
</style>
</head>
<body>

<section class="detail-top">

  <h1 class="detail-h" id="detailTitle">Bob coloring sheet</h1>

<div class="detail-sep"></div>

<section class="more-section" aria-label="More Bob coloring sheets">
  <div class="more-section-head">

<script src="site-menu.js"></script>
<script src="site-footer.js"></script>
<script src="diy-shell.js"></script>

<script src="signup-drawer.js"></script>
<script src="auth-links.js"></script>
<script>
(function () {
  var PAINTINGS = {
    'bobs-bubble-fun': {
      title: "bob's bubble fun",
      tag: 'Bob',
      desc: 'Grab your crayons and help Bob blow the biggest bubbles in the whole wide world!',
      body: [
        'Grab your crayons and help Bob blow the biggest bubbles in the whole wide world! Color Bob, his top hat, and every shimmering bubble floating through the sunny sky.',
        'Parents, use <strong>#ShareThePlay</strong> on social media so we can see how they did!'
      ]
    },
    'bobs-bike-ride': {
      title: "bob's colorful bike ride",
      tag: 'Bob',
      desc: "Color in Bob's bike, helmet, and the sunny park path on this printable adventure sheet.",
      body: [
        "Send Bob on a colorful bike ride through the park! Fill in his helmet, wheels, and the winding path with your brightest crayons and markers.",
        'Parents, use <strong>#ShareThePlay</strong> on social media so we can see how they did!'
      ]
    },
    'bobs-block-tower': {
      title: "bob's block tower",
      tag: 'Bob',
      desc: "Stack, color, and decorate Bob's tallest block tower with every color of the rainbow.",
      body: [
        "Stack, color, and decorate Bob's tallest block tower with every color of the rainbow. Add patterns to each block and draw Bob cheering beside his masterpiece!",
        'Parents, use <strong>#ShareThePlay</strong> on social media so we can see how they did!'
      ]
    }
  };

  var PAINTING_IDS = Object.keys(PAINTINGS);
  var defaultId = 'bobs-bubble-fun';

  function getImageHtml(id) {
    var src = document.getElementById('src-' + id);
    return src ? src.innerHTML : '';
  }

  function renderMoreCards(currentId) {
    var container = document.getElementById('morePaintingCards');
    var startIndex = PAINTING_IDS.indexOf(currentId);
    var html = '';

    for (var i = 1; i <= 2; i++) {
      var id = PAINTING_IDS[(startIndex + i) % PAINTING_IDS.length];
      var data = PAINTINGS[id];
      html += '<a class="printable-card more-card" href="toysrus-bobs-painting.html#' + id + '" data-id="' + id + '">' +
        '<div class="photo-card">' + getImageHtml(id) + '</div>' +
        '<div class="card-text">' +
          '<h2 class="card-title">' + data.title + '</h2>' +
          '<p class="card-desc">' + data.desc + '</p>' +
        '</div>' +
      '</a>';
    }

    container.innerHTML = html;
  }

  function openPainting(id, replaceHistory) {
    var data = PAINTINGS[id];
    if (!data) {
      id = defaultId;
      data = PAINTINGS[id];
    }

    document.title = data.title + ' – Toys"R"Us';
    document.getElementById('detailTitle').textContent = data.title;
    document.getElementById('detailBreadcrumbTitle').textContent = data.title;
    document.getElementById('detailTag').textContent = data.tag;
    document.getElementById('detailImg').innerHTML = getImageHtml(id);
    document.getElementById('detailBody').innerHTML = data.body.map(function (p) {
      return '<p>' + p + '</p>';
    }).join('');
    renderMoreCards(id);
    window.scrollTo(0, 0);

    var state = { id: id };
    if (replaceHistory) {
      history.replaceState(state, '', '#' + id);
    } else {
      history.pushState(state, '', '#' + id);
    }
  }

  function getHashId() {
    var hash = location.hash.replace(/^#/, '');
    return PAINTINGS[hash] ? hash : defaultId;
  }

  window.addEventListener('popstate', function () {
    openPainting(getHashId(), true);
  });

  window.addEventListener('hashchange', function () {
    openPainting(getHashId(), true);
  });

  openPainting(getHashId(), true);
})();
</script>
</body>
</html>
