<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Account – AJ BLOKS</title>
<style>
  @import url(https://db.onlinewebfonts.com/c/1b62cb414d23538e8a465e7f50aa7932?family=Buenos+Aires);
  :root {
    --blue: #004ebc;
    --blue-dark: #003894;
    --blue-soft: #E7EBFB;
    --ink: #11214A;
    --radius-pill: 999px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Buenos Aires', sans-serif;
    background: #f0efed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 480px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid #e5e5e5;
    overflow: visible;
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo img {
    height: clamp(47px, 12.6vw, 61px);
    width: auto;
    max-width: min(288px, 94vw);
    object-fit: contain;
    display: block;
    transform: scale(1.25);
    transform-origin: center center;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
  }

  .account-avatar-wrap {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    margin-right: 10px;
    transform: translateX(-14px);
  }

  .account-avatar {
    width: 80px;
    height: 80px;
    object-fit: contain;
    margin-top: 80px;
    display: block;
    transform: scale(2);
    transform-origin: center center;
  }

  /* ── Tab Nav ── */
  .tab-nav {
    width: 100%;
    max-width: 480px;
    background: #f0efed;
    display: flex;
    gap: 20px;
    padding: 20px 18px 0;
  }

  .tab-btn {
    background: none;
    border: none;
    font-size: 17px;
    font-weight: 400;
    color: #888;
    cursor: pointer;
    padding-bottom: 6px;
    border-bottom: 2px solid transparent;
    letter-spacing: -0.01em;
  }

  .tab-btn.active {
    font-weight: 700;
    color: #111;
    border-bottom: 2px solid #111;
  }

  /* ── Main content ── */
  main {
    width: 100%;
    max-width: 480px;
    flex: 1;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── Welcome card (Orders view) ── */
  .welcome-card {
    background: #fff;
    border-radius: 12px;
    padding: 22px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .welcome-text h2 {
    font-size: 20px;
    font-weight: 700;
    color: #111;
  }

  .welcome-text p {
    font-size: 16px;
    color: #666;
    margin-top: 2px;
  }

  .shop-btn {
    background: var(--blue);
    color: #fff;
    border-radius: var(--radius-pill);
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 4px 0 var(--blue-dark);
    transition: transform 0.08s ease;
  }

  .shop-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--blue-dark);
  }

  /* ── Profile view ── */
  .profile-section {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .section-header h3 {
    font-size: 17px;
    font-weight: 700;
    color: #111;
  }

  .edit-btn, .add-btn {
    background: var(--blue);
    color: #fff;
    border-radius: var(--radius-pill);
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 3px 0 var(--blue-dark);
    transition: transform 0.08s ease;
  }

  .edit-btn:active, .add-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--blue-dark);
  }

  .info-card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
  }

  .info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    border-bottom: 1px solid #f0f0f0;
  }

  .info-row:last-child { border-bottom: none; }

  .info-label {
    font-size: 14px;
    color: #aaa;
  }

  .info-value {
    font-size: 14px;
    color: #111;
    text-align: right;
    word-break: break-all;
  }

  /* No address */
  .empty-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px;
  }

  .empty-icon {
    width: 38px;
    height: 38px;
    background: #f0f0f0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .empty-icon svg { width: 20px; height: 20px; fill: #999; }

  .empty-text {
    font-size: 15px;
    color: #aaa;
  }

  /* Marketing prefs */
  .pref-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
  }

  .pref-left {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    color: #111;
  }

  .pref-left svg { width: 20px; height: 20px; fill: #555; }

  /* Toggle */
  .toggle {
    position: relative;
    width: 52px;
    height: 30px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 30px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    left: 3px;
    top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }

  .toggle input:checked + .toggle-slider { background: var(--blue); }

  .toggle input:checked + .toggle-slider::before { transform: translateX(22px); }

  /* checkmark inside toggle */
  .toggle input:checked + .toggle-slider::after {
    content: '✓';
    position: absolute;
    right: 6px;
    top: 5px;
    font-size: 11px;
    color: #fff;
    font-weight: 700;
  }

  /* Sign out buttons */
  .signout-card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
  }

  .signout-btn {
    width: 100%;
    background: none;
    padding: 18px;
    font-size: 16px;
    font-weight: 700;
    color: var(--blue);
    text-align: center;
    border-bottom: 1px solid #f0f0f0;
  }

  .signout-btn:last-child { border-bottom: none; }
  .signout-btn:hover { background: var(--blue-soft); }

  /* ── Footer ── */
  footer {
    width: 100%;
    max-width: 480px;
    padding: 16px 18px 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 18px;
    justify-content: center;
  }

  footer a {
    font-size: 13px;
    color: var(--blue);
    text-decoration: underline;
    cursor: pointer;
    font-weight: 600;
  }

  footer a:hover { color: var(--blue-dark); }

  @media (hover: hover) {
    .shop-btn:hover,
    .edit-btn:hover,
    .add-btn:hover {
      filter: brightness(1.08);
    }
  }

  /* ── Hidden state ── */
  .view { display: none; }
  .view.active { display: contents; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <a class="logo" href="home-page.html" aria-label="AJ BLOKS home">
    <img src="https://res.cloudinary.com/dbtkfjrvd/image/upload/v1782245376/Design_sans_titre_31_azudmo.png" alt="AJ BLOKS">
  </a>
  <div class="account-avatar-wrap">
    <img class="account-avatar" src="https://res.cloudinary.com/dbtkfjrvd/image/upload/v1782348577/Design_sans_titre_42_l4wtzl.png" alt="Account">
  </div>
</header>

<!-- Tab Nav -->
<nav class="tab-nav">
  <button class="tab-btn active" id="tab-orders" onclick="switchTab('orders')">Orders</button>
  <button class="tab-btn" id="tab-profile" onclick="switchTab('profile')">Profile</button>
</nav>

<!-- Main -->
<main>

  <!-- ORDERS VIEW -->
  <div class="view active" id="view-orders">
    <div class="welcome-card">
      <div class="welcome-text">
        <h2>Welcome</h2>
        <p>Ready to shop?</p>
      </div>
      <button class="shop-btn">Shop now</button>
    </div>
  </div>

  <!-- PROFILE VIEW -->
  <div class="view" id="view-profile">
    <div class="profile-section">

      <!-- Contact -->
      <div>
        <div class="section-header">
          <h3>Contact</h3>
          <button class="edit-btn">Edit</button>
        </div>
        <div class="info-card">
          <div class="info-row">
            <span class="info-label">Email</span>
            <span class="info-value">khadidja.khaoila.hassani@gmail.com</span>
          </div>
        </div>
      </div>

      <!-- Addresses -->
      <div>
        <div class="section-header">
          <h3>Addresses</h3>
          <button class="add-btn">Add</button>
        </div>
        <div class="info-card">
          <div class="empty-row">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
              </svg>
            </div>
            <span class="empty-text">No addresses added</span>
          </div>
        </div>
      </div>

      <!-- Marketing Preferences -->
      <div>
        <div class="section-header">
          <h3>Marketing preferences</h3>
        </div>
        <div class="info-card">
          <div class="pref-row">
            <div class="pref-left">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>
              </svg>
              Email
            </div>
            <label class="toggle">
              <input type="checkbox" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- Sign out -->
      <div class="signout-card">
        <button class="signout-btn">Sign out</button>
      </div>

    </div>
  </div>

</main>

<!-- Footer -->
<footer>
  <a>Refund policy</a>
  <a>Shipping</a>
  <a>Privacy policy</a>
  <a>Terms of service</a>
</footer>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('view-' + tab).classList.add('active');
  }
</script>
</body>
</html>
