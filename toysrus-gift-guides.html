<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="cart-drawer.css">

<style>
  :root {
    --tru-blue: #0057A8;
    --tag-blue-bg: #D6EAF8;
    --tag-blue-text: #1A6FA0;
    --tag-purple-bg: #E8D5F5;
    --tag-purple-text: #7B2D8B;
    --tag-green-bg: #D5F5E3;
    --tag-green-text: #1E8449;
    --tag-red-bg: #FADBD8;
    --tag-red-text: #C0392B;
    --tag-orange-bg: #FDEBD0;
    --tag-orange-text: #CA6F1E;
  }

  .page-hero { width: 100%; line-height: 0; overflow: hidden; }
  .page-hero img { width: 100%; display: block; object-fit: cover; }

  .breadcrumb {
    background: rgb(249, 249, 249);
    padding: 22px 18px;
    font-size: 18px;
    color: #1450c4;
  }
  .breadcrumb a { color: #1450c4; text-decoration: underline; font-weight: 500; }
  .breadcrumb .sep { color: #1a1a1a; margin: 0 6px; text-decoration: none; }

  .tags-section { padding: 20px 16px 20px; }
  .tags-label {
    font-family: 'Buenos Aires', sans-serif;
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .tags-grid { display: flex; flex-wrap: wrap; gap: 10px; }

  .activity-cards { padding-top: 0; padding-bottom: 40px; }
  .activity-card { padding: 0 16px 20px; }
  .activity-card .card-link { display: block; color: inherit; text-decoration: none; }
  .activity-card .card-link:hover h3 { color: var(--tru-blue); }

  .tag {
    display: inline-block;
    font-family: 'Buenos Aires', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 999px;
    text-decoration: none;
    transition: transform .08s;
  }
  .tag:active { transform: translateY(2px); box-shadow: none !important; }
  .tag.blue  { background: var(--tag-blue-bg); color: var(--tag-blue-text); box-shadow: 0 3px 0 var(--tag-blue-text); }
  .tag.purple{ background: var(--tag-purple-bg); color: var(--tag-purple-text); box-shadow: 0 3px 0 var(--tag-purple-text); }
  .tag.green { background: var(--tag-green-bg); color: var(--tag-green-text); box-shadow: 0 3px 0 var(--tag-green-text); }
  .tag.red   { background: var(--tag-red-bg); color: var(--tag-red-text); box-shadow: 0 3px 0 var(--tag-red-text); }
  .tag.orange{ background: var(--tag-orange-bg); color: var(--tag-orange-text); box-shadow: 0 3px 0 var(--tag-orange-text); }

  .activity-card .card-img {
    border-radius: 14px;
    overflow: hidden;
    height: 200px;
    background: #dde8d8;
    margin-bottom: 12px;
  }
  .activity-card h3 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .activity-card p { font-size: 14px; color: #444; line-height: 1.5; margin-bottom: 10px; }
  .activity-card .card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: #888; font-size: 13px; background: #f0f4f8;
    padding: 16px; text-align: center;
  }
</style>
<link rel="stylesheet" href="site-footer.css">
</head>
<body>

<div class="diy-content">
  <section class="page-hero">

  </section>

  <nav class="breadcrumb">
    <a href="home-page.html">Home</a><span class="sep">›</span><a href="toysrus-gift-guides.html">Guides cadeaux</a>
  </nav>

  <div class="tags-section">
    <div class="tags-label">Tags:</div>
    <div class="tags-grid">
      <a href="toysrus-gift-guide-tag.html?tag=Birthday" class="tag purple">Birthday</a>
      <a href="toysrus-gift-guide-tag.html?tag=Christmas" class="tag red">Christmas</a>
      <a href="toysrus-gift-guide-tag.html?tag=Toddler" class="tag green">Toddler</a>
      <a href="toysrus-gift-guide-tag.html?tag=Kids" class="tag blue">Kids</a>
      <a href="toysrus-gift-guide-tag.html?tag=Teens" class="tag orange">Teens</a>
      <a href="toysrus-gift-guide-tag.html?tag=Bob" class="tag green">Bob</a>
      <a href="toysrus-gift-guide-tag.html?tag=LEGO" class="tag purple">LEGO</a>
      <a href="toysrus-gift-guide-tag.html?tag=Budget" class="tag blue">Budget</a>
      <a href="toysrus-gift-guide-tag.html?tag=STEM" class="tag orange">STEM</a>
      <a href="toysrus-gift-guide-tag.html?tag=Outdoor" class="tag green">Outdoor</a>
      <a href="toysrus-gift-guide-tag.html?tag=Baby" class="tag purple">Baby</a>
      <a href="toysrus-gift-guide-tag.html?tag=Family" class="tag red">Family</a>
    </div>
  </div>

  <div class="activity-cards" id="giftGuideCards"></div>
</div>

</script>

</body>
</html>
