<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mega_blok_category_pills</title>
<style>
  :root{
    --red: #E2231A;
    --yellow: #FFC72C;
    --cyan: #82DDE6;
    --line: #e7e7e7;
    --gray-text: #c7c7c7;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:#fff;
    color:#111;
  }
  .page{
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ---------- Title ---------- */
  .title-wrap{
    overflow:hidden;
    padding: 28px 0 18px;
  }
  h1.page-title{
    margin: 0;
    margin-left: -16px;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.5px;
    white-space: nowrap;
    line-height: 1.05;
  }

  /* ---------- About pill ---------- */
  .about-wrap{
    display:flex;
    justify-content:center;
    padding: 6px 24px 28px;
  }
  .pill-about{
    background: var(--cyan);
    border:none;
    border-radius: 999px;
    padding: 18px 36px;
    font-size: 19px;
    font-weight: 700;
    color:#111;
    cursor:pointer;
  }
  .pill-about:active{ transform: scale(0.98); }

  /* ---------- Filter row ---------- */
  .filter-row{
    display:flex;
    gap: 14px;
    padding: 0 24px 22px;
  }
  .filter-btn{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background:#fff;
    border: 1.5px solid #e2e2e2;
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 16px;
    font-weight: 600;
    color:#111;
    cursor:pointer;
  }
  .filter-btn svg{ flex-shrink:0; }
  .filter-btn.open svg{ transform: rotate(180deg); }

  .divider-full{
    border:none;
    border-top: 1px solid var(--line);
    margin: 0 0 0;
  }

  /* ---------- Product grid ---------- */
  .product-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    width:100%;
  }
  .product-card{
    min-width:0;
    padding: 22px 18px 24px;
    border-bottom: 1px solid var(--line);
  }
  .product-card:nth-child(odd){ border-right: 1px solid var(--line); }

  .carousel{
    display:flex;
    min-width:0;
    overflow-x:auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    border-radius: 10px;
    background:#fafafa;
    margin-bottom: 10px;
  }
  .carousel::-webkit-scrollbar{ display:none; }
  .carousel .slide{
    flex: 0 0 100%;
    scroll-snap-align:start;
    height:150px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .block-icon{ display:flex; align-items:flex-end; gap:4px; }
  .block-icon div{ border-radius: 6px; }

  .dots{
    display:flex;
    justify-content:center;
    align-items:center;
    gap: 6px;
    margin-bottom: 14px;
  }
  .dot{
    width:6px; height:6px;
    border-radius:999px;
    background: var(--gray-text);
    cursor:pointer;
  }
  .dot.active{
    width:18px;
    background: var(--red);
  }

  .product-title{
    font-size: 15.5px;
    font-weight: 700;
    text-align:center;
    margin: 0 0 10px;
    line-height: 1.3;
    min-height: 60px;
    min-width: 0;
    overflow-wrap: break-word;
    display:-webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow:hidden;
  }

  .stars{
    display:flex;
    justify-content:center;
    gap:4px;
    margin-bottom: 18px;
  }
  .stars svg{ width:19px; height:19px; }

  .buy-btn{
    display:block;
    width:100%;
    background: var(--yellow);
    border:none;
    border-radius: 999px;
    padding: 14px 8px;
    font-size: 15.5px;
    font-weight: 800;
    color:#111;
    cursor:pointer;
  }
  .buy-btn:active{ transform: scale(0.98); }

  /* ---------- Modal (where to buy) ---------- */
  .overlay{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index: 50;
  }
  .overlay.show{ display:flex; }
  .sheet{
    width:100%;
    max-width: 480px;
    background:#fff;
    border-radius: 22px 22px 0 0;
    padding: 22px 22px 30px;
    animation: rise 0.25s ease-out;
  }
  @keyframes rise{ from{ transform: translateY(30px); opacity:0; } to{ transform: translateY(0); opacity:1; } }
  .sheet h3{ margin:0 0 4px; font-size:18px; }
  .sheet p{ margin:0 0 18px; color:#777; font-size:14px; }
  .retailer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 16px 4px;
    border-bottom: 1px solid var(--line);
    font-weight:600;
    font-size:15.5px;
  }
  .retailer:last-of-type{ border-bottom:none; }
  .close-sheet{
    margin-top: 16px;
    width:100%;
    background:#111;
    color:#fff;
    border:none;
    border-radius: 999px;
    padding: 14px;
    font-weight:700;
    font-size:15.5px;
  }

  /* ---------- Filter sheet (Filtrer) ---------- */
  .filter-overlay{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.45);
    display:none;
    z-index: 60;
  }
  .filter-overlay.show{ display:block; }
  .filter-sheet{
    position:absolute;
    top:0; left:50%;
    transform: translateX(-50%);
    width:100%;
    max-width:480px;
    max-height:88vh;
    background:#fff;
    display:flex;
    flex-direction:column;
    border-radius: 0 0 20px 20px;
    box-shadow: 0 14px 30px rgba(0,0,0,0.18);
    animation: rise 0.22s ease-out;
  }
  .filter-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 22px 22px 18px;
    border-bottom: 1px solid var(--line);
  }
  .filter-header h2{ margin:0; font-size:26px; font-weight:800; }
  .filter-close-x{
    background:none; border:none; cursor:pointer;
    font-size:26px; line-height:1; color:#111; padding:4px;
  }
  .filter-scroll{ overflow-y:auto; flex:1; }
  .acc-section{ border-bottom: 1px solid var(--line); }
  .acc-toggle{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:none;
    border:none;
    padding: 20px 22px;
    font-size: 19px;
    color:#222;
    cursor:pointer;
    text-align:left;
  }
  .acc-toggle svg{ flex-shrink:0; transition: transform .2s; }
  .acc-toggle.open svg{ transform: rotate(180deg); }
  .acc-body{ display:none; padding: 0 22px 12px; }
  .acc-body.show{ display:block; }
  .check-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 13px 0;
  }
  .check-row label{
    display:flex;
    align-items:center;
    gap: 16px;
    font-size: 17px;
    color:#222;
    cursor:pointer;
  }
  .check-row input[type=checkbox]{
    -webkit-appearance:none; appearance:none;
    width:23px; height:23px;
    border:1.5px solid #aaa;
    border-radius:5px;
    cursor:pointer;
    position:relative;
    flex-shrink:0;
    margin:0;
  }
  .check-row input[type=checkbox]:checked{ background:#111; border-color:#111; }
  .check-row input[type=checkbox]:checked::after{
    content:'';
    position:absolute; left:7px; top:3px;
    width:6px; height:11px;
    border:solid #fff; border-width:0 2px 2px 0;
    transform:rotate(45deg);
  }
  .check-row .count{ font-weight:700; font-size:16px; color:#111; }
  .filter-footer{
    display:flex;
    align-items:center;
    gap: 20px;
    padding: 18px 22px 24px;
    border-top: 1px solid var(--line);
  }
  .clear-all{
    background:none; border:none;
    color: var(--red);
    font-weight:700;
    font-size:16px;
    text-decoration: underline;
    cursor:pointer;
    white-space:nowrap;
  }
  .apply-btn{
    flex:1;
    background:#111;
    color:#fff;
    border:none;
    border-radius:999px;
    padding: 16px;
    font-weight:700;
    font-size:17px;
    cursor:pointer;
  }
  .apply-btn:active{ transform: scale(0.99); }

  /* ---------- Trier (sort) sheet ---------- */
  .sort-options{ padding: 6px 0 18px; }
  .sort-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    background:none;
    border:none;
    text-align:left;
    padding: 18px 22px;
    font-size: 18px;
    color:#111;
    cursor:pointer;
  }
  .sort-row .check{ opacity:0; }
  .sort-row.selected .check{ opacity:1; }
  .sort-row.selected{ font-weight:700; }
</style>
</head>
<body>

<div class="page">

  <div class="title-wrap">
    <h1 class="page-title">mega_blok_category_pills</h1>
  </div>

  <div class="about-wrap">
    <button class="pill-about" onclick="alert('À propos de Mega Bloks — jouets de construction adaptés aux petites mains, dès 1 an.')">À propos Mega Bloks</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn" id="filtrerBtn" onclick="openFilterSheet()">
      Filtrer
      <svg width="14" height="9" viewBox="0 0 14 9" fill="none"><path d="M1 1L7 7L13 1" stroke="#E2231A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="filter-btn" id="recoBtn" onclick="openSortSheet()">
      Recommandé
      <svg width="14" height="9" viewBox="0 0 14 9" fill="none"><path d="M1 1L7 7L13 1" stroke="#E2231A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <hr class="divider-full">

  <div class="product-grid" id="grid"></div>

</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h3 id="sheetTitle">Où l'acheter</h3>
    <p>Choisissez un revendeur</p>
    <div class="retailer">Amazon <span>›</span></div>
    <div class="retailer">Walmart <span>›</span></div>
    <div class="retailer">Toys"R"Us <span>›</span></div>
    <div class="retailer">Target <span>›</span></div>
    <button class="close-sheet" onclick="closeSheet()">Fermer</button>
  </div>
</div>

<div class="filter-overlay" id="filterOverlay">
  <div class="filter-sheet">
    <div class="filter-header">
      <h2>Filtrer</h2>
      <button class="filter-close-x" onclick="closeFilterSheet()">&times;</button>
    </div>

    <div class="filter-scroll" id="filterScroll"></div>

    <div class="filter-footer">
      <button class="clear-all" onclick="clearAllFilters()">Effacer tout</button>
      <button class="apply-btn" onclick="closeFilterSheet()">Appliquer</button>
    </div>
  </div>
</div>

<div class="filter-overlay" id="sortOverlay">
  <div class="filter-sheet">
    <div class="filter-header">
      <h2>Trier</h2>
      <button class="filter-close-x" onclick="closeSortSheet()">&times;</button>
    </div>

    <div class="sort-options" id="sortOptions"></div>

    <div class="filter-footer">
      <button class="apply-btn" onclick="closeSortSheet()">Appliquer</button>
    </div>
  </div>
</div>

<script>
  const sortOptions = [
    "Les plus récents",
    "Nom: A-Z",
    "Nom: Z-A",
    "Prix (mini à maxi)",
    "Prix (maxi à mini)"
  ];

  const sortOptionsEl = document.getElementById('sortOptions');
  sortOptions.forEach((label, i)=>{
    const row = document.createElement('button');
    row.className = 'sort-row';
    row.dataset.index = i;
    row.innerHTML = `
      ${label}
      <svg class="check" width="18" height="14" viewBox="0 0 18 14" fill="none"><path d="M1 7L6.5 12.5L17 1.5" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    `;
    row.onclick = ()=> selectSort(i);
    sortOptionsEl.appendChild(row);
  });

  function selectSort(index){
    document.querySelectorAll('.sort-row').forEach((row,i)=>{
      row.classList.toggle('selected', i === index);
    });
  }

  function openSortSheet(){
    document.getElementById('sortOverlay').classList.add('show');
  }
  function closeSortSheet(){
    document.getElementById('sortOverlay').classList.remove('show');
  }
  document.getElementById('sortOverlay').addEventListener('click', e=>{
    if(e.target.id === 'sortOverlay') closeSortSheet();
  });
</script>

<script>
  const filterData = [
    { key:'categorie', label:'Catégorie', options:[
      { label:'Cubes de construction et coffrets', count:1 },
      { label:'Jouets pour tout-petit', count:13 }
    ]},
    { key:'type', label:'Type', options:[
      { label:'Blocs de construction', count:14 }
    ]},
    { key:'theme', label:'Thème', options:[
      { label:'MEGA Bloks', count:5 },
      { label:'MEGA Bloks Green Town', count:1 }
    ]},
    { key:'age', label:'Âge', options:[
      { label:'6-12 mois', count:8 },
      { label:'12-24 mois', count:12 },
      { label:'2-4 ans', count:12 },
      { label:'5 ans et plus', count:4 },
      { label:'1-2 ans', count:2 }
    ]}
  ];

  function chevronSVG(){
    return `<svg width="16" height="10" viewBox="0 0 14 9" fill="none"><path d="M1 1L7 7L13 1" stroke="#E2231A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  const filterScroll = document.getElementById('filterScroll');
  filterData.forEach(section=>{
    const wrap = document.createElement('div');
    wrap.className = 'acc-section';
    const rows = section.options.map((opt,i)=>`
      <div class="check-row">
        <label>
          <input type="checkbox" data-section="${section.key}" data-label="${opt.label}">
          ${opt.label}
        </label>
        <span class="count">${opt.count}</span>
      </div>
    `).join('');
    wrap.innerHTML = `
      <button class="acc-toggle" onclick="toggleAcc(this)">
        ${section.label}
        ${chevronSVG()}
      </button>
      <div class="acc-body">${rows}</div>
    `;
    filterScroll.appendChild(wrap);
  });

  function toggleAcc(btn){
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('show');
  }

  function openFilterSheet(){
    document.getElementById('filterOverlay').classList.add('show');
  }
  function closeFilterSheet(){
    document.getElementById('filterOverlay').classList.remove('show');
  }
  document.getElementById('filterOverlay').addEventListener('click', e=>{
    if(e.target.id === 'filterOverlay') closeFilterSheet();
  });
  function clearAllFilters(){
    document.querySelectorAll('#filterScroll input[type=checkbox]').forEach(cb=> cb.checked = false);
  }
</script>

<script>
  const products = [
    { title: "MEGA BLOKS-Tracteur Mes Animaux À Assembler-Coffret De...", colors: ["#E2231A","#3FB6E0","#FFC72C","#3CB878"] },
    { title: "MEGA BLOKS-Camion Course Et Construction-Coffret Avec 19 Pièces", colors: ["#2E5AAC","#E2231A","#FFC72C","#3CB878"] },
    { title: "Fisher Price - Veilleuse Doux Sommeil Mega Bloks - Jouet De Construction...", colors: ["#9B7FE0","#3FB6E0","#FFC72C","#F08AB0"] },
    { title: "Mega Bloks-Les Musiciens De La Ferme-Jouet Sensoriel (45 Pcs)", colors: ["#FFC72C","#3CB878","#9B7FE0","#E2231A"] },
    { title: "Mega Bloks - Le Train - Jouet De Construction - 1 An Et +", colors: ["#E2231A","#FFC72C","#3FB6E0","#3CB878"] },
    { title: "Mega Bloks - Le Train De L'Alphabet - Cubes De Construction Préscolair...", colors: ["#3FB6E0","#FFC72C","#E2231A","#9B7FE0"] },
    { title: "Mega Bloks - Dinos Couic Et Croq - Jouet Sensoriel (24 Pcs)", colors: ["#3CB878","#F08AB0","#FFC72C","#9B7FE0"] },
    { title: "Mega Bloks People - Véhicules Et Personnages - Coffret De Jeu", colors: ["#F08AB0","#3FB6E0","#FFC72C","#E2231A"] }
  ];

  function blockIcon(colors, shuffleSeed){
    const baseHeights = [54, 70, 62, 46];
    const baseWidths  = [26, 30, 22, 26];
    const order = colors.map((_,i)=>i);
    // rotate the order per-slide so each slide in a product's carousel looks slightly different
    for(let i=0;i<shuffleSeed;i++) order.push(order.shift());
    return `<div class="block-icon">` +
      order.map((ci,i)=>`<div style="width:${baseWidths[i]}px;height:${baseHeights[i]}px;background:${colors[ci]}"></div>`).join('') +
      `</div>`;
  }

  function starSVG(){
    return `<svg viewBox="0 0 24 24" fill="none"><path d="M12 2.5l2.9 6.3 6.9.7-5.1 4.7 1.5 6.8L12 17.6l-6.2 3.4 1.5-6.8L2.2 9.5l6.9-.7L12 2.5z" stroke="#cfcfcf" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
  }

  const SLIDE_COUNT = 5;

  function dotsHTML(cardId, active){
    let html = `<div class="dots" data-for="${cardId}">`;
    for(let i=0;i<SLIDE_COUNT;i++){
      html += `<span class="dot ${i===active?'active':''}" onclick="goToSlide('${cardId}', ${i})"></span>`;
    }
    return html + '</div>';
  }

  function carouselHTML(cardId, colors){
    let html = `<div class="carousel" id="${cardId}" onscroll="onCarouselScroll('${cardId}')">`;
    for(let i=0;i<SLIDE_COUNT;i++){
      html += `<div class="slide">${blockIcon(colors, i)}</div>`;
    }
    return html + '</div>';
  }

  const grid = document.getElementById('grid');
  products.forEach((p, idx)=>{
    const cardId = 'carousel-' + idx;
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      ${carouselHTML(cardId, p.colors)}
      ${dotsHTML(cardId, 0)}
      <p class="product-title">${p.title}</p>
      <div class="stars">${starSVG().repeat(5)}</div>
      <button class="buy-btn" onclick="openSheet('${p.title.replace(/'/g, "\\'")}')">Où l'acheter</button>
    `;
    grid.appendChild(card);
  });

  function goToSlide(cardId, index){
    const carousel = document.getElementById(cardId);
    carousel.scrollTo({ left: index * carousel.clientWidth, behavior: 'smooth' });
  }

  let scrollTicking = {};
  function onCarouselScroll(cardId){
    if (scrollTicking[cardId]) return;
    scrollTicking[cardId] = true;
    requestAnimationFrame(()=>{
      const carousel = document.getElementById(cardId);
      const index = Math.round(carousel.scrollLeft / carousel.clientWidth);
      const dotsWrap = document.querySelector(`.dots[data-for="${cardId}"]`);
      if(dotsWrap){
        dotsWrap.querySelectorAll('.dot').forEach((d,i)=> d.classList.toggle('active', i === index));
      }
      scrollTicking[cardId] = false;
    });
  }

  function openSheet(title){
    document.getElementById('sheetTitle').textContent = title.length > 40 ? "Où l'acheter" : "Où l'acheter — " + title;
    document.getElementById('overlay').classList.add('show');
  }
  function closeSheet(){
    document.getElementById('overlay').classList.remove('show');
  }
  document.getElementById('overlay').addEventListener('click', e=>{
    if(e.target.id === 'overlay') closeSheet();
  });
</script>

</body>
</html>
