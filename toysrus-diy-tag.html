<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIY Activities – Toys"R"Us</title>
<link rel="stylesheet" href="cart-drawer.css">
<link rel="stylesheet" href="signup-drawer.css">
<link rel="stylesheet" href="site-menu.css">
<link rel="stylesheet" href="diy-shell.css">
<style>
  :root {
    --tru-blue: #0057A8;
    --tag-blue-bg: #D6EAF8;
    --tag-blue-text: #1A6FA0;
    --tag-purple-bg: #E8D5F5;
    --tag-purple-text: #7B2D8B;
    --tag-green-bg: #D5F5E3;
    --tag-green-text: #1E8449;
    --tag-red-bg: #FADBD8;
    --tag-red-text: #C0392B;
    --tag-orange-bg: #FDEBD0;
    --tag-orange-text: #CA6F1E;
  }

  .page-hero { width: 100%; line-height: 0; overflow: hidden; }
  .page-hero img { width: 100%; display: block; object-fit: cover; }

  .breadcrumb {
    background: rgb(249, 249, 249);
    padding: 22px 18px;
    font-size: 18px;
    color: #1450c4;
  }
  .breadcrumb a { color: #1450c4; text-decoration: underline; font-weight: 500; }
  .breadcrumb .sep { color: #1a1a1a; margin: 0 6px; text-decoration: none; }

  .tagged-header {
    padding: 24px 16px 28px;
    text-align: center;
    font-family: 'Buenos Aires', sans-serif;
    font-size: 24px;
    font-weight: 800;
    line-height: 1.3;
  }

  .activity-cards { padding-top: 0; padding-bottom: 40px; }
  .activity-card { padding: 0 16px 20px; }
  .activity-card .card-link { display: block; color: inherit; text-decoration: none; }
  .activity-card .card-link:hover h3 { color: var(--tru-blue); }

  .tag {
    display: inline-block;
    font-family: 'Buenos Aires', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 999px;
    text-decoration: none;
    transition: transform .08s;
  }
  .tag:active { transform: translateY(2px); box-shadow: none !important; }
  .tag.blue  { background: var(--tag-blue-bg); color: var(--tag-blue-text); box-shadow: 0 3px 0 var(--tag-blue-text); }
  .tag.purple{ background: var(--tag-purple-bg); color: var(--tag-purple-text); box-shadow: 0 3px 0 var(--tag-purple-text); }
  .tag.green { background: var(--tag-green-bg); color: var(--tag-green-text); box-shadow: 0 3px 0 var(--tag-green-text); }
  .tag.red   { background: var(--tag-red-bg); color: var(--tag-red-text); box-shadow: 0 3px 0 var(--tag-red-text); }
  .tag.orange{ background: var(--tag-orange-bg); color: var(--tag-orange-text); box-shadow: 0 3px 0 var(--tag-orange-text); }

  .activity-card .card-img {
    border-radius: 14px;
    overflow: hidden;
    height: 200px;
    background: #dde8d8;
    margin-bottom: 12px;
  }
  .activity-card h3 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .activity-card p { font-size: 14px; color: #444; line-height: 1.5; margin-bottom: 10px; }
  .activity-card .card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: #888; font-size: 13px; background: #f0f4f8;
    padding: 16px; text-align: center;
  }

  .empty-state {
    padding: 24px 16px 40px;
    text-align: center;
    color: #666;
    font-size: 16px;
  }
</style>
<link rel="stylesheet" href="site-footer.css">
</head>
<body>

<div class="diy-content">
  <section class="page-hero">
    <img src="https://res.cloudinary.com/dbtkfjrvd/image/upload/v1782383899/Design_sans_titre_44_rkv5bi.png" alt="Activités créatives">
  </section>

  <nav class="breadcrumb">
    <a href="home-page.html">Home</a><span class="sep">›</span><a href="toysrus-diy-activities.html">DIY Activities</a><span class="sep">›</span><span id="breadcrumbTag">Bike</span>
  </nav>

  <h1 class="tagged-header" id="taggedHeader">Tagged with:</h1>

  <div class="activity-cards" id="activityCards"></div>
  <p class="empty-state" id="emptyState" hidden>No activities found for this tag yet.</p>
</div>

<script src="diy-activities-data.js"></script>
<script src="diy-activities-ui.js"></script>
<script src="site-menu.js"></script>
<script src="site-footer.js"></script>
<script src="diy-shell.js"></script>
<script>
  var currentTag = new URLSearchParams(window.location.search).get('tag') || 'Bike';

  document.title = 'Tagged with: ' + currentTag + ' – Toys"R"Us DIY Activities';
  document.getElementById('taggedHeader').textContent = 'Tagged with: ' + currentTag;
  document.getElementById('breadcrumbTag').textContent = currentTag;

  var matches = window.DIY_ACTIVITIES.filter(function (activity) {
    return activity.tags.indexOf(currentTag) !== -1;
  });

  var activityCards = document.getElementById('activityCards');
  var emptyState = document.getElementById('emptyState');

  if (!matches.length) {
    activityCards.hidden = true;
    emptyState.hidden = false;
  } else {
    window.renderDiyActivityCards(matches, activityCards);
  }
</script>
<script src="cart-drawer.js"></script>
<script src="signup-drawer.js"></script>
<script src="auth-links.js"></script>
</body>
</html>
