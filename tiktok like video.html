<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayMart — Build-It Brick Construction Set</title>
<link rel="stylesheet" href="cart-drawer.css">
<link rel="stylesheet" href="signup-drawer.css">
<style>
  @import url(https://db.onlinewebfonts.com/c/1b62cb414d23538e8a465e7f50aa7932?family=Buenos+Aires);
  :root{
    --blue:#0747C9;
    --blue-dark:#04308f;
    --pink:#ff3d77;
    --pink-deep:#e0186a;
    --yellow:#ffce32;
    --ink:#16182b;
    --ink-soft:#5b5e72;
    --line:#e7e8ee;
    --bg:#f4f5f9;
    --white:#ffffff;
    --green:#1c8a4b;
    --red:#e23b3b;
    --radius:18px;
    --radius-sm:10px;
    --shadow:0 12px 30px rgba(16,20,40,.14);
    --shadow-sm:0 4px 14px rgba(16,20,40,.10);
    --nav-blue:#004ebc;
    --sky:#BFEAFB;
    --cream:#FFFDF8;
    --page-pad:16px;
    --radius-pill:999px;
    --trus-red:#ed1c24;
    --site-chrome-h:0px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Buenos Aires',sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }

  /* ===== Phone-frame stage (the page lives in a mobile-width column, like the source screenshots) ===== */
  .stage{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:stretch;
    background:linear-gradient(180deg,#e9ebf3,#dfe2ee);
    padding:0;
  }
  @media (min-width:480px){
    .stage{ padding:18px 0; }
  }
  .app{
    width:100%;
    max-width:430px;
    background:var(--white);
    position:relative;
    overflow:hidden;
    box-shadow:var(--shadow);
    height:100vh;
    height:100dvh;
    min-height:0;
    border-radius:0;
  }
  @media (min-width:480px){
    .app{ border-radius:30px; height:min(880px,100dvh); min-height:0; }
  }

  button{font-family:inherit;cursor:pointer;}
  a{text-decoration:none;color:inherit;}

  /* ===== Site chrome (promo + nav from home page) ===== */
  .site-chrome{
    position:fixed;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:430px;
    z-index:30;
    background:var(--cream);
  }
  @media (min-width:480px){
    .site-chrome{
      top:18px;
      border-radius:30px 30px 0 0;
      overflow:hidden;
    }
  }
  .promo-bar{
    background:var(--sky);
    color:#000;
    text-align:center;
    font-weight:700;
    font-size:clamp(.75rem, 2.5vw, .88rem);
    letter-spacing:.2px;
    padding:9px var(--page-pad);
    font-family:'Buenos Aires',sans-serif;
  }
  .nav{
    background:var(--nav-blue);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px var(--page-pad) 12px;
    gap:4px;
    overflow:visible;
  }
  .nav-icons{display:flex;align-items:center;gap:0;flex-shrink:0;}
  .site-chrome .icon-btn,
  .pdp-drawer-chrome .icon-btn{
    background:transparent;
    color:#fff;
    min-width:30px; min-height:30px;
    width:30px; height:30px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:1rem;
    border-radius:50%;
    position:relative;
    padding:0;
    border:none;
    cursor:pointer;
  }
  .site-chrome .icon-btn:active,
  .pdp-drawer-chrome .icon-btn:active{background:rgba(255,255,255,.15);}
  .site-chrome .icon-btn .nav-icon,
  .pdp-drawer-chrome .icon-btn .nav-icon{
    width:18px;height:18px;
    display:block;
    stroke:currentColor;
    fill:none;
    stroke-width:1.75;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .logo{
    display:flex;
    align-items:center;
    justify-content:center;
    flex:1;
    min-width:0;
    overflow:visible;
  }
  .logo img{
    height:clamp(47px, 12.6vw, 61px);
    width:auto;
    max-width:min(288px, 94vw);
    object-fit:contain;
    display:block;
    transform:scale(1.25);
    transform-origin:center center;
  }
  .nav-default{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    gap:4px;
  }
  .nav-search{
    display:none;
    align-items:center;
    width:100%;
    gap:10px;
  }
  .nav.is-search-active .nav-default{display:none;}
  .nav.is-search-active .nav-search{display:flex;}
  .search-form{flex:1;min-width:0;}
  .search-input{
    width:100%;
    height:44px;
    padding:0 16px;
    border:none;
    border-radius:var(--radius-pill);
    background:#fff;
    color:#212427;
    font-family:'Buenos Aires',sans-serif;
    font-size:1rem;
    font-weight:600;
    outline:none;
  }
  .search-input::placeholder{color:#212427;opacity:.55;}
  .search-input:focus{box-shadow:0 0 0 2px rgba(255,255,255,.35);}
  .search-close .nav-icon{width:20px;height:20px;stroke-width:2;}
  .cart-nav-btn{position:relative;}
  .cart-badge{
    position:absolute;
    top:0;
    right:0;
    min-width:17px;
    height:17px;
    padding:0 4px;
    background:var(--trus-red);
    color:#fff;
    font-size:10px;
    font-weight:800;
    border-radius:999px;
    display:none;
    align-items:center;
    justify-content:center;
    line-height:1;
    pointer-events:none;
  }
  .cart-badge.is-visible{display:flex;}

  .video-stage .icon-btn{
    border:none;background:transparent;color:inherit;
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;
    border-radius:50%;flex:none;
  }
  .video-stage .icon-btn svg{width:16px;height:16px;}
  .video-stage .icon-btn:active{background:rgba(255,255,255,.18);}

  /* ===== Shoppable video stage ===== */
  .video-stage{
    position:fixed;
    top:var(--site-chrome-h);
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:430px;
    height:calc(100dvh - var(--site-chrome-h));
    background:#000;
    overflow:hidden;
    z-index:10;
  }
  @media (min-width:480px){
    .video-stage{
      top:calc(18px + var(--site-chrome-h));
      height:min(880px, calc(100dvh - 36px - var(--site-chrome-h)));
      border-radius:0 0 30px 30px;
    }
  }
  .video-scroll{
    position:absolute; inset:0;
    overflow-y:auto; overflow-x:hidden;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .video-scroll::-webkit-scrollbar{display:none;}
  .video-page{
    height:100%;
    scroll-snap-align:start; scroll-snap-stop:always;
    position:relative;
    overflow:hidden;
  }
  .video-visual{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .scene{width:100%;height:100%;}

  /* tiny CSS scenes standing in for the UGC video content */
  .scene-bricks{background:linear-gradient(180deg,#cfe8ff,#9fd0ff 60%, #7fbdf5);position:relative;}
  .brick-stack{position:absolute;bottom:14%;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:4px;animation:stackUp 3.2s ease-in-out infinite;}
  .brick{height:22px;border-radius:4px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.15);}
  .brick:nth-child(1){width:70px;background:#ff5d5d;}
  .brick:nth-child(2){width:90px;background:#ffd23f;}
  .brick:nth-child(3){width:60px;background:#3aa6ff;}
  .brick:nth-child(4){width:100px;background:#39c06b;}
  @keyframes stackUp{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-6px);}}
  .hand{position:absolute;bottom:0;left:50%;transform:translateX(-30%);width:54px;height:70px;background:#e7b690;border-radius:30px 30px 10px 10px;}

  .scene-horse{background:linear-gradient(180deg,#bfe6c8,#8fd19f 70%,#6cb87f);position:relative;}
  .horse-body{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);width:120px;height:60px;background:#cdb6e8;border-radius:50px 60px 40px 40px;}
  .horse-mane{position:absolute;bottom:32%;left:calc(50% + 18px);width:48px;height:30px;background:linear-gradient(90deg,#ff7ab8,#ffd23f,#6fe0d8);border-radius:0 30px 30px 0;animation:sway 2.6s ease-in-out infinite;}
  @keyframes sway{0%,100%{transform:rotate(0deg);}50%{transform:rotate(6deg);}}
  .horse-horn{position:absolute;bottom:58%;left:calc(50% + 42px);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:22px solid #ffd23f;border-radius:2px;}

  .scene-vending{background:linear-gradient(180deg,#ffe2ae,#ffcf78 70%,#f2b65a);position:relative;}
  .vend-box{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);width:90px;height:120px;background:#fff7e6;border:4px solid #c98a2b;border-radius:8px;display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:8px;}
  .vend-box span{background:#5fb8ff;border-radius:3px;animation:blink 2.4s ease-in-out infinite;}
  .vend-box span:nth-child(2){background:#ff8fb1;animation-delay:.3s;}
  .vend-box span:nth-child(3){background:#ffd23f;animation-delay:.6s;}
  .vend-box span:nth-child(4){background:#7ce0a0;animation-delay:.9s;}
  @keyframes blink{0%,100%{opacity:.55;}50%{opacity:1;}}

  .video-top-controls{
    position:absolute; top:28px; right:8px; z-index:5;
    display:flex; flex-direction:column; gap:10px; align-items:center;
  }
  .video-top-controls .icon-btn{color:#fff;background:rgba(0,0,0,.22);}
  .app.pdp-open .video-top-controls{display:none;}

  .progress-rail{
    position:absolute; top:0; left:0; right:0; z-index:3;
    padding:10px 12px 0;
    pointer-events:none;
  }
  .progress-track{
    height:3px; border-radius:2px;
    background:rgba(255,255,255,.35);
    overflow:hidden;
  }
  .progress-fill{
    display:block; height:100%; width:0%;
    background:#fff; border-radius:2px;
  }
  .video-page.playing .progress-fill{
    animation:progressPlay 5s linear forwards;
  }
  @keyframes progressPlay{from{width:0%;}to{width:100%;}}

  .video-nav{
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    display:flex;flex-direction:column;gap:8px;z-index:5;
  }
  .video-nav .icon-btn{color:#fff;background:rgba(0,0,0,.22);}
  .video-nav .icon-btn:disabled{opacity:.35;}

  .mute-btn{
    position:absolute; right:10px; bottom:86px; z-index:5;
    color:#fff;background:rgba(0,0,0,.28);
    transition:bottom .28s ease;
  }
  .video-stage.peek-collapsed .mute-btn{bottom:52px;}

  /* peek carousel overlay at bottom of video */
  .peek-panel{
    position:absolute; left:0; right:0; bottom:0; z-index:4;
    display:flex; flex-direction:column; align-items:stretch;
  }
  .peek-toggle-wrap{
    display:flex; align-items:center; gap:8px;
    padding:0 10px 6px;
    align-self:flex-start;
  }
  .peek-toggle{
    width:30px; height:30px; border-radius:50%;
    background:rgba(255,255,255,.92); color:var(--ink);
    border:none; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 10px rgba(0,0,0,.18);
  }
  .peek-toggle:active{transform:scale(.94);}
  .peek-toggle-chevron{
    width:14px; height:14px;
    stroke:currentColor; fill:none;
    stroke-width:2.3; stroke-linecap:round; stroke-linejoin:round;
    transition:transform .25s ease;
  }
  .peek-toggle-label{
    display:none;
    color:#fff; font-size:13px; font-weight:700;
    font-family:'Buenos Aires',sans-serif;
    text-shadow:0 1px 4px rgba(0,0,0,.55);
  }
  .peek-panel.is-collapsed .peek-toggle-label{display:inline;}
  .peek-panel.is-collapsed .peek-toggle-chevron{transform:rotate(180deg);}
  .peek-strip{
    width:100%;
    background:transparent;
    display:flex; align-items:center; gap:6px; padding:0 8px 8px;
    overflow:hidden;
    max-height:86px;
    opacity:1;
    transition:max-height .28s ease, opacity .22s ease, padding .28s ease;
  }
  .peek-panel.is-collapsed .peek-strip{
    max-height:0; opacity:0; padding:0 8px;
    pointer-events:none;
  }
  .peek-strip > *{pointer-events:auto;}
  .peek-arrow{
    background:rgba(255,255,255,.85); border:none; border-radius:50%;
    width:26px;height:26px;flex:none;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;color:var(--ink);
    cursor:pointer;
  }
  .peek-arrow:disabled{opacity:.35;cursor:default;}
  .peek-card{
    flex:1; background:#fff; border-radius:12px; padding:8px 10px;
    display:flex;align-items:center;gap:10px; box-shadow:var(--shadow-sm);
    cursor:pointer;
  }
  .peek-card:active{transform:scale(.98);}
  .peek-thumb{width:40px;height:40px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg);}
  .peek-text{flex:1;min-width:0;}
  .peek-text .name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Buenos Aires',sans-serif;}
  .peek-text .price{font-size:12px;color:var(--ink-soft);font-family:'Buenos Aires',sans-serif;}

  /* ===== PDP drawer (slides up from bottom) ===== */
  #pdpBackdrop{z-index:48;}
  .pdp-drawer{
    position:fixed; left:50%; bottom:0; z-index:49;
    width:100%; max-width:430px;
    height:100%; max-height:100dvh;
    background:var(--white);
    transform:translateX(-50%) translateY(100%);
    transition:transform .32s cubic-bezier(.32,.9,.3,1);
    display:flex; flex-direction:column;
    overflow:hidden;
    box-shadow:0 -10px 30px rgba(0,0,0,.18);
  }
  @media (min-width:480px){
    .pdp-drawer{
      bottom:18px;
      max-height:min(880px, calc(100dvh - 36px));
      border-radius:30px;
    }
  }
  .pdp-drawer.open{transform:translateX(-50%) translateY(0);}
  .pdp-drawer-chrome{
    flex:none;
    flex-shrink:0;
    width:100%;
    background:var(--cream);
    overflow:hidden;
  }
  @media (min-width:480px){
    .pdp-drawer-chrome{border-radius:30px 30px 0 0;}
  }
  .pdp-drawer-chrome .promo-bar,
  .pdp-drawer-chrome .nav{width:100%;box-sizing:border-box;}
  .pdp-drawer-body{
    flex:1;
    min-height:0;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    background:var(--white);
  }
  .pdp-drawer .pdp{padding:12px 16px 32px;}
  .pdp-return-bar{
    display:flex;
    align-items:center;
    padding:4px 0 12px;
    margin-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .pdp-return-btn{
    display:flex;
    align-items:center;
    gap:8px;
    background:none;
    border:none;
    padding:4px 2px;
    font-family:'Buenos Aires',sans-serif;
    font-size:14px;
    font-weight:700;
    color:var(--ink);
    cursor:pointer;
  }
  .pdp-return-btn svg{
    width:22px;
    height:22px;
    stroke:currentColor;
    fill:none;
    stroke-width:2.3;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .pdp-return-btn:active{opacity:.7;}
  .gallery{margin-bottom:14px;}
  .gallery-stage{
    display:flex;
    align-items:center;
    gap:6px;
    width:100%;
  }
  .gallery-viewport{
    flex:1;
    min-width:0;
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:x proximity;
    scrollbar-width:none;
    border-radius:var(--radius);
  }
  .gallery-viewport::-webkit-scrollbar{display:none;}
  .gallery-track{
    display:flex;
    align-items:stretch;
    gap:10px;
    padding:2px 4px;
    width:max-content;
  }
  .gallery-slide{
    flex:0 0 150px;
    width:150px;
    height:150px;
    scroll-snap-align:start;
    border-radius:14px;
    background:var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
  }
  .gallery-arrow{
    width:28px;
    height:28px;
    border-radius:50%;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-size:20px;
    line-height:1;
    flex-shrink:0;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:var(--shadow-sm);
    padding:0;
  }
  .gallery-arrow:active{transform:scale(.94);}

  .pdp-eyebrow{font-size:12px;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
  .pdp-title{font-size:20px;font-weight:800;margin:0 0 8px;line-height:1.3;}
  .price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:2px;}
  .price{font-size:22px;font-weight:800;}
  .price-strike{font-size:14px;color:var(--ink-soft);text-decoration:line-through;}
  .stock{font-size:13px;font-weight:700;margin-bottom:16px;}
  .stock.in{color:var(--green);}
  .stock.out{color:var(--red);}

  .pdp-actions{display:flex;flex-direction:column;gap:10px;margin-bottom:4px;}
  .pdp-actions .add-cart-btn{
    width:100%;
    background:var(--blue);
    color:#fff;
    font-family:'Buenos Aires',sans-serif;
    font-weight:700;
    font-size:.92rem;
    padding:11px;
    min-height:44px;
    border-radius:var(--radius-pill);
    box-shadow:0 3px 0 var(--blue-dark);
    transition:transform .08s;
    border:none;
    cursor:pointer;
  }
  .pdp-actions .add-cart-btn:active:not(:disabled){transform:translateY(2px);box-shadow:none;}
  .pdp-actions .add-cart-btn:disabled{background:#cfd1da;box-shadow:none;color:#777;cursor:default;}
  .pdp-actions .buy-now-btn{
    width:100%;
    background:#fff;
    color:var(--blue);
    font-family:'Buenos Aires',sans-serif;
    font-weight:700;
    font-size:.92rem;
    padding:11px;
    min-height:44px;
    border-radius:var(--radius-pill);
    border:2px solid var(--blue);
    cursor:pointer;
    transition:transform .08s;
  }
  .pdp-actions .buy-now-btn:active{transform:translateY(2px);}

  /* You may also like */
  .recs{margin-top:28px;}
  .recs h2{font-size:16px;font-weight:800;margin:0 0 12px;}
  .recs-scroll{
    display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;
    scroll-snap-type:x mandatory;
  }
  .recs-scroll::-webkit-scrollbar{height:0;}
  .rec-card{
    flex:0 0 132px;scroll-snap-align:start;cursor:pointer;
  }
  .rec-thumb{
    width:100%;height:120px;border-radius:14px;background:var(--bg);
    display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:8px;
  }
  .rec-name{font-size:12.5px;font-weight:600;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:32px;}
  .rec-price{font-size:13px;font-weight:800;margin-top:4px;}
  .recs-progress-rail{
    margin-top:12px;
    padding:0 2px;
  }
  .recs-progress-track{
    height:3px;
    border-radius:2px;
    background:var(--line);
    position:relative;
    overflow:hidden;
  }
  .recs-progress-thumb{
    position:absolute;
    top:0;
    left:0;
    height:100%;
    width:42px;
    background:var(--blue);
    border-radius:2px;
    transition:left .08s linear;
  }

  /* ===== Drawers (share + options) ===== */
  .backdrop{
    position:fixed;inset:0;
    left:50%;transform:translateX(-50%);
    width:100%;max-width:430px;
    background:rgba(10,12,24,.5);
    opacity:0;visibility:hidden;transition:opacity .25s;z-index:40;
  }
  @media (min-width:480px){
    .backdrop{top:18px;height:calc(100% - 36px);}
  }
  .backdrop.open{opacity:1;visibility:visible;}

  .drawer{
    position:fixed; left:50%; bottom:0; z-index:41;
    width:100%;max-width:430px;
    background:#fff; border-radius:22px 22px 0 0;
    transform:translateX(-50%) translateY(100%);
    transition:transform .32s cubic-bezier(.32,.9,.3,1);
    padding:10px 18px 22px; box-shadow:0 -10px 30px rgba(0,0,0,.18);
    max-height:80%; overflow-y:auto;
  }
  @media (min-width:480px){
    .drawer{bottom:18px;}
  }
  .drawer.open{transform:translateX(-50%) translateY(0);}
  .drawer-handle{width:40px;height:4px;background:var(--line);border-radius:4px;margin:4px auto 14px;}
  .drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .drawer-header h3{font-size:16px;margin:0;}

  var videoIndex = 0;
  var productIndex = 0;

  var videoScroll = document.getElementById('videoScroll');
  var peekCard = document.getElementById('peekCard');
  var peekPrevBtn = document.getElementById('peekPrev');
  var peekNextBtn = document.getElementById('peekNext');
  var prevBtn = document.getElementById('prevVideoBtn');
  var nextBtn = document.getElementById('nextVideoBtn');

  function sceneMarkup(scene){
    if(scene === 'bricks'){
      return '<div class="scene scene-bricks"><div class="brick-stack">'+
        '<div class="brick"></div><div class="brick"></div><div class="brick"></div><div class="brick"></div>'+
        '</div><div class="hand"></div></div>';
    }
    if(scene === 'horse'){
      return '<div class="scene scene-horse"><div class="horse-body"></div><div class="horse-mane"></div><div class="horse-horn"></div></div>';
    }
    return '<div class="scene scene-vending"><div class="vend-box"><span></span><span></span><span></span><span></span></div></div>';
  }

  /* Build every video as a real page in one tall scroller. With scroll-snap
     on the container, the browser's native swipe (touch) and wheel (desktop)
     handling gives the up/down TikTok-style paging for free — no JS needed
     to move between videos, only to keep the overlay chrome in sync. */
  videos.forEach(function(v, i){
    var page = document.createElement('div');
    page.className = 'video-page' + (i === 0 ? ' playing' : '');
    page.innerHTML =
      '<div class="progress-rail" aria-hidden="true"><div class="progress-track"><span class="progress-fill"></span></div></div>'+
      '<div class="video-visual">'+ sceneMarkup(v.scene) +'</div>';
    videoScroll.appendChild(page);
  });

  function updateProgressRail(idx){
    Array.prototype.forEach.call(videoScroll.children, function(page, i){
      var fill = page.querySelector('.progress-fill');
      page.classList.toggle('playing', i === idx);
      fill.style.animation = 'none';
      fill.style.width = '0%';
      if(i === idx){
        void fill.offsetWidth;
        fill.style.animation = '';
      }
    });
  }

  function renderPeekCard(){
    var products = videos[videoIndex].products;
    var product = products[productIndex];
    peekCard.innerHTML =
      '<div class="peek-thumb">'+ product.emoji +'</div>'+
      '<div class="peek-text"><div class="name">'+ product.name +'</div><div class="price">'+ product.price +'</div></div>';
    peekCard.setAttribute('aria-label', 'View product details: ' + product.name);
    peekPrevBtn.disabled = productIndex === 0;
    peekNextBtn.disabled = productIndex === products.length - 1;
  }

  function updateChrome(idx, resetProduct){
    if(resetProduct !== false) productIndex = 0;
    var product = videos[idx].products[productIndex];
    renderPeekCard();
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === videos.length - 1;
    updateProgressRail(idx);
  }

  function goToProduct(idx){
    var products = videos[videoIndex].products;
    idx = Math.max(0, Math.min(products.length - 1, idx));
    if(idx === productIndex) return;
    productIndex = idx;
    renderPeekCard();
  }

  function goToVideo(idx){
    idx = Math.max(0, Math.min(videos.length - 1, idx));
    if(idx === videoIndex) return;
    videoIndex = idx;
    productIndex = 0;
    videoScroll.scrollTo({ top: idx * videoScroll.clientHeight, behavior:'smooth' });
    updateChrome(idx, false);
  }

  /* keep the peek card / progress rail / arrows synced to whichever
     video is actually centered after a swipe or scroll settles */
  var scrollSettleTimer;
  videoScroll.addEventListener('scroll', function(){
    clearTimeout(scrollSettleTimer);
    scrollSettleTimer = setTimeout(function(){
      var idx = Math.round(videoScroll.scrollTop / videoScroll.clientHeight);
      idx = Math.max(0, Math.min(videos.length - 1, idx));
      if(idx !== videoIndex){
        videoIndex = idx;
        productIndex = 0;
        updateChrome(idx, false);
      }
    }, 90);
  }, { passive:true });

  updateChrome(videoIndex);

  nextBtn.addEventListener('click', function(){ if(videoIndex < videos.length - 1) goToVideo(videoIndex + 1); });
  prevBtn.addEventListener('click', function(){ if(videoIndex > 0) goToVideo(videoIndex - 1); });
  peekNextBtn.addEventListener('click', function(e){
    e.stopPropagation();
    if(productIndex < videos[videoIndex].products.length - 1) goToProduct(productIndex + 1);
  });
  peekPrevBtn.addEventListener('click', function(e){
    e.stopPropagation();
    if(productIndex > 0) goToProduct(productIndex - 1);
  });

  var peekPanel = document.getElementById('peekPanel');
  var peekToggle = document.getElementById('peekToggle');
  var videoStage = document.getElementById('videoStage');
  peekToggle.addEventListener('click', function(){
    var collapsed = peekPanel.classList.toggle('is-collapsed');
    videoStage.classList.toggle('peek-collapsed', collapsed);
    peekToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    peekToggle.setAttribute('aria-label', collapsed ? 'Show products' : 'Hide products');
  });

  function pdpFromProduct(product){
    return {
      eyebrow:'Featured in video',
      name:product.name,
      price:product.price,
      strike:product.strike || null,
      inStock:true,
      emoji:product.emoji,
      images:[product.emoji,'📦','🖼️','🎁','✨','🔧','🏗️','🚗','⭐','🎯','📷','🛒']
    };
  }

  function closeVideoDrawers(){
    ['shareDrawer','optionsDrawer'].forEach(function(id){
      var el = document.getElementById(id);
      if(el){ el.classList.remove('open'); el.style.transform = ''; }
    });
    ['shareBackdrop','optionsBackdrop'].forEach(function(id){
      var el = document.getElementById(id);
      if(el) el.classList.remove('open');
    });
  }

  var pdpDrawer = document.getElementById('pdpDrawer');
  var pdpBackdrop = document.getElementById('pdpBackdrop');
  var pdpDrawerBody = document.getElementById('pdpDrawerBody');

  function pdpDrawerTransform(y){
    return 'translateX(-50%) translateY(' + y + ')';
  }

  function openPdpDrawer(){
    app.classList.add('pdp-open');
    pdpDrawer.classList.add('open');
    pdpBackdrop.classList.add('open');
    closeVideoDrawers();
    if(pdpDrawerBody) pdpDrawerBody.scrollTop = 0;
  }

  function closePdpDrawer(){
    app.classList.remove('pdp-open');
    pdpDrawer.classList.remove('open');
    pdpBackdrop.classList.remove('open');
    pdpDrawer.style.transform = '';
    closePdpSearch();
  }

  function openProductDetail(p){
    renderPDP(p);
    openPdpDrawer();
  }

  peekCard.setAttribute('role','button');
  peekCard.setAttribute('tabindex','0');
  peekCard.setAttribute('aria-label','View product details');
  peekCard.addEventListener('click', function(){
    var product = videos[videoIndex].products[productIndex];
    openProductDetail(pdpFromProduct(product));
  });
  peekCard.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      peekCard.click();
    }
  });

  /* mute toggle */
  var muteBtn = document.getElementById('muteBtn');
  var muted = true;
  muteBtn.addEventListener('click', function(){
    muted = !muted;
    muteBtn.setAttribute('aria-label', muted ? 'Unmute video' : 'Mute video');
    muteBtn.innerHTML = muted
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="4 9 9 9 14 4 14 20 9 15 4 15 4 9"/><line x1="17" y1="9" x2="22" y2="14"/><line x1="22" y1="9" x2="17" y2="14"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="4 9 9 9 14 4 14 20 9 15 4 15 4 9"/><path d="M16 9a4 4 0 0 1 0 6"/><path d="M19 7a7 7 0 0 1 0 10"/></svg>';
  });

  /* =====================================================================
     PRODUCT DETAIL DATA + RENDER
  ===================================================================== */
  var mainProduct = {
    eyebrow:'Building Sets', name:'Build-It Brick Construction Set — Dock & Garage',
    price:'$26.99', strike:'$32.99', inStock:true, emoji:'🧱',
    images:['🧱','📦','🖼️','🎁','✨','🔧','🏗️','🚗','⭐','🎯','📷','🛒']
  };

  var recs = [
    { name:'Mix It Up Science Lab Kit', price:'$19.99', emoji:'🧪' },
    { name:'Snack Time Wooden Vending Playset', price:'$79.99', emoji:'🏪' },
    { name:'Dough Dentist Play Set', price:'$17.49', emoji:'🦷' },
    { name:'Mystic Horse & Rider Doll Set', price:'$34.99', emoji:'🦄' }
  ];

  var galleryTrack = document.getElementById('galleryTrack');
  var galleryViewport = document.getElementById('galleryViewport');
  var galleryPrevBtn = document.getElementById('galleryPrev');
  var galleryNextBtn = document.getElementById('galleryNext');

  function galleryScrollStep(){
    var slide = galleryTrack.querySelector('.gallery-slide');
    if(!slide) return 118;
    return slide.offsetWidth + 10;
  }

  function renderGallery(images){
    var list = images && images.length ? images.slice() : ['📦'];
    galleryTrack.innerHTML = '';
    list.forEach(function(img){
      var slide = document.createElement('div');
      slide.className = 'gallery-slide';
      slide.textContent = img;
      galleryTrack.appendChild(slide);
    });
    if(galleryViewport) galleryViewport.scrollLeft = 0;
  }

  galleryPrevBtn.addEventListener('click', function(){
    if(galleryViewport) galleryViewport.scrollBy({ left: -galleryScrollStep(), behavior: 'smooth' });
  });
  galleryNextBtn.addEventListener('click', function(){
    if(galleryViewport) galleryViewport.scrollBy({ left: galleryScrollStep(), behavior: 'smooth' });
  });

  function renderPDP(p){
    document.querySelector('.pdp-eyebrow').textContent = p.eyebrow;
    document.querySelector('.pdp-title').textContent = p.name;
    document.querySelector('.price').textContent = p.price;
    document.querySelector('.price-strike').style.display = p.strike ? '' : 'none';
    if(p.strike) document.querySelector('.price-strike').textContent = p.strike;
    var stock = document.getElementById('stockLabel');
    stock.textContent = p.inStock ? '● In stock' : '● Out of stock';
    stock.className = 'stock ' + (p.inStock ? 'in' : 'out');
    document.getElementById('addToCartBtn').disabled = !p.inStock;
    document.getElementById('addToCartBtn').textContent = p.inStock ? 'Add to cart' : 'Out of stock';
    renderGallery(p.images || [p.emoji || '📦']);
  }
  renderPDP(mainProduct);

  var recsScroll = document.getElementById('recsScroll');
  recs.forEach(function(r){
    var card = document.createElement('div');
    card.className = 'rec-card';
    card.innerHTML =
      '<div class="rec-thumb">'+ r.emoji +'</div>'+
      '<div class="rec-name">'+ r.name +'</div>'+
      '<div class="rec-price">'+ r.price +'</div>';
    card.addEventListener('click', function(){
      openProductDetail({ eyebrow:'Recommended', name:r.name, price:r.price, strike:null, inStock:true, emoji:r.emoji, images:[r.emoji,'📦','🖼️','🎁','✨','🔧','🏗️','🚗','⭐','🎯'] });
    });
    recsScroll.appendChild(card);
  });

  var recsProgressTrack = document.getElementById('recsProgressTrack');
  var recsProgressThumb = document.getElementById('recsProgressThumb');
  function updateRecsProgress(){
    if(!recsScroll || !recsProgressTrack || !recsProgressThumb) return;
    var maxScroll = recsScroll.scrollWidth - recsScroll.clientWidth;
    var trackWidth = recsProgressTrack.clientWidth;
    var thumbWidth = recsProgressThumb.offsetWidth;
    var maxThumbTravel = Math.max(0, trackWidth - thumbWidth);
    var ratio = maxScroll > 0 ? (recsScroll.scrollLeft / maxScroll) : 0;
    recsProgressThumb.style.left = (ratio * maxThumbTravel) + 'px';
  }
  recsScroll.addEventListener('scroll', updateRecsProgress, {passive:true});
  window.addEventListener('resize', updateRecsProgress);
  updateRecsProgress();

  /* cart + buy actions */
  var cartCount = 0;
  function bumpCart(){
    cartCount++;
    var badgeText = String(cartCount);
    var mainBadge = document.getElementById('cartBadge');
    var pdpBadge = document.getElementById('pdpCartBadge');
    if(mainBadge) mainBadge.textContent = badgeText;
    if(pdpBadge) pdpBadge.textContent = badgeText;
  }
  document.getElementById('addToCartBtn').addEventListener('click', function(){
    if(this.disabled) return;
    bumpCart();
    showToast('Added to cart');
  });
  document.getElementById('buyNowBtn').addEventListener('click', function(){
    showToast('Heading to checkout…');
  });

  /* =====================================================================
     DRAWERS — share + options
  ===================================================================== */
  function wireDrawer(drawerId, backdropId, openTriggers, closeBtnId, canOpen){
    var drawer = document.getElementById(drawerId);
    var backdrop = document.getElementById(backdropId);
    var closeBtn = document.getElementById(closeBtnId);

    function drawerTransform(y){
      return 'translateX(-50%) translateY(' + y + ')';
    }

    function open(){
      if(canOpen && !canOpen()) return;
      drawer.classList.add('open');
      backdrop.classList.add('open');
    }
    function close(){
      drawer.classList.remove('open');
      backdrop.classList.remove('open');
      drawer.style.transform = '';
    }

    openTriggers.forEach(function(el){ el.addEventListener('click', open); });
    closeBtn.addEventListener('click', close);
    backdrop.addEventListener('click', close);

    var startY = null;
    drawer.addEventListener('touchstart', function(e){ startY = e.touches[0].clientY; }, {passive:true});
    drawer.addEventListener('touchmove', function(e){
      if(startY === null) return;
      var dy = e.touches[0].clientY - startY;
      if(dy > 0) drawer.style.transform = drawerTransform(dy + 'px');
    }, {passive:true});
    drawer.addEventListener('touchend', function(e){
      var dy = (e.changedTouches[0].clientY - startY);
      drawer.style.transform = '';
      if(dy > 90) close();
      startY = null;
    });

    return { open: open, close: close };
  }

  function isVideoView(){
    return !pdpDrawer.classList.contains('open');
  }

  var shareDrawer = wireDrawer('shareDrawer', 'shareBackdrop', [document.getElementById('shareBtn')], 'shareCloseBtn', isVideoView);
  var optionsDrawer = wireDrawer('optionsDrawer', 'optionsBackdrop', [document.getElementById('moreOptionsBtn')], 'optionsCloseBtn', isVideoView);

  document.getElementById('reportBtn').addEventListener('click', function(){
    showToast('Report submitted');
    optionsDrawer.close();
  });

  document.querySelectorAll('.share-item').forEach(function(btn){
    btn.addEventListener('click', function(){
      showToast('Opening ' + btn.getAttribute('aria-label').replace('Share on ', '') + ' share…');
      shareDrawer.close();
    });
  });

  document.getElementById('pdpBackBtn').addEventListener('click', closePdpDrawer);
  pdpBackdrop.addEventListener('click', closePdpDrawer);
  document.querySelectorAll('.pdp-cart-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var mainCart = document.getElementById('cartOpenBtn');
      if(mainCart) mainCart.click();
    });
  });

  var pdpStartY = null;
  pdpDrawer.addEventListener('touchstart', function(e){ pdpStartY = e.touches[0].clientY; }, {passive:true});
  pdpDrawer.addEventListener('touchmove', function(e){
    if(pdpStartY === null || (pdpDrawerBody && pdpDrawerBody.scrollTop > 0)) return;
    var dy = e.touches[0].clientY - pdpStartY;
    if(dy > 0) pdpDrawer.style.transform = pdpDrawerTransform(dy + 'px');
  }, {passive:true});
  pdpDrawer.addEventListener('touchend', function(e){
    if(pdpStartY === null) return;
    var dy = e.changedTouches[0].clientY - pdpStartY;
    pdpDrawer.style.transform = '';
    if(dy > 90 && (!pdpDrawerBody || pdpDrawerBody.scrollTop <= 0)) closePdpDrawer();
    pdpStartY = null;
  });

})();
</script>
<script src="cart-drawer.js"></script>
<script src="signup-drawer.js"></script>
<script src="auth-links.js"></script>
</body>
</html>
